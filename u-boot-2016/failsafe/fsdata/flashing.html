<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="initResultPage('flashing', 1800000)">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="flashing.title.in_progress"></h1>
				</div>
				<div class="card-hint-section">
					<p id="hint" data-i18n-html="flashing.hint.in_progress"></p>
				</div>
				<div class="card-main-section">
					<div class="card-main-inner">
						<div id="l"></div>
						<div id="error-info" class="error-message" style="display: none;"></div>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
