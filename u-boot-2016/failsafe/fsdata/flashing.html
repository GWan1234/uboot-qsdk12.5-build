<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
	<script>
		function init() {
			appInit('flashing');

			ajax({
				url: '/result',
				done: function (response) {
					if (response == 'failed') {
						location = '/fail.html'
						return
					}

					document.getElementById('title').innerHTML = t('flashing.title.done')
					document.getElementById('info').innerHTML = t('flashing.info.done')
				},
				timeout: 1800000
			})
		}
	</script>
</head>

<body onload="init()">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="flashing.title.in_progress"></h1>
				</div>
				<div class="card-hint-section">
					<p id="info" data-i18n-html="flashing.info.in_progress"></p>
				</div>
				<div class="card-main-section">
					<div id="l"></div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
