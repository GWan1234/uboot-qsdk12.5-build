<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="appInit('backup')" data-page="backup">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
		<div class="sidebar-overlay" id="sidebarOverlay"></div>
		<button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="backup.title"></h1>
				</div>

				<div class="card-hint-section">
					<p id="hint" data-i18n-html="backup.hint"></p>
				</div>

				<div class="card-main-section">
					<div class="card-main-inner">
						<div class="backup-form">
							<div class="form-row form-row-2" id="backup_mode_target_row">
								<div class="field">
									<label for="backup_mode" data-i18n="backup.label.mode"></label>
									<select id="backup_mode" class="field-control">
										<option value="part" data-i18n="backup.mode.part"></option>
										<option value="range" data-i18n="backup.mode.range"></option>
									</select>
								</div>

								<div class="field" id="backup_target_field">
									<label for="backup_target" data-i18n="backup.label.target"></label>
									<select id="backup_target" class="field-control"></select>
								</div>
							</div>

							<div id="backup_range" class="backup-range" style="display: none;">
								<div class="form-row form-row-2">
									<div class="field">
										<label for="backup_start" data-i18n="backup.label.start"></label>
										<input id="backup_start" class="field-control" type="text" placeholder="0x0 / 64KiB">
									</div>
									<div class="field">
										<label for="backup_end" data-i18n="backup.label.end"></label>
										<input id="backup_end" class="field-control" type="text" placeholder="0x1000 / 128KiB">
									</div>
								</div>
								<div id="backup_range_hint" class="backup-range-hint"></div>
							</div>

							<div class="form-actions">
								<button type="button" class="button" onclick="startBackup()"
									data-i18n="backup.action.download"></button>
							</div>
						</div>

						<div class="bar-circle" id="backup_progress" style="display: none; --percent: 0;"></div>
						<div id="backup_status" style="display: none;" class="backup-status"></div>
					</div>
				</div>

				<div class="card-foot-section">
					<div class="card-foot-inner">
						<div class="i w">
							<strong data-i18n="common.warnings"></strong>
							<ul>
								<li data-i18n="backup.warn.1"></li>
								<li data-i18n="backup.warn.2"></li>
								<li data-i18n="backup.warn.3"></li>
							</ul>
						</div>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
