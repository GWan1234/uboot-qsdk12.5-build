<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="appInit('ptable')" data-page="ptable">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="ptable.title"></h1>
				</div>

				<div class="card-hint-section">
					<p id="hint" data-i18n-html="ptable.hint"></p>
				</div>

				<div class="card-main-section">
					<div class="card-main-inner">
						<form id="form">
							<input id="file" type="file" name="ptable">
							<input type="button" value="Upload" data-i18n-attr="value:common.upload" onclick="upload('ptable')">
						</form>
						<div class="bar-circle" id="bar-circle" style="display: none; --percent: 0;"></div>
						<div id="success-info" style="display: none;">
                            <div id="file-type" class="info-item"></div>
                            <div id="size" class="info-item"></div>
                            <div id="md5" class="info-item"></div>
                        </div>
                        <div id="error-info" class="error-message" style="display: none;"></div>
						<div id="upgrade" style="display: none;">
							<p data-i18n="common.upgrade_hint"></p>
							<button class="button" data-i18n="common.update" onclick="location = '/flashing.html'"></button>
						</div>
					</div>
				</div>

				<div class="card-foot-section">
					<div class="card-foot-inner">
						<div class="i w">
							<strong data-i18n="common.warnings"></strong>
							<ul>
								<li data-i18n="common.warn.1"></li>
								<li data-i18n="common.warn.2"></li>
								<li data-i18n="ptable.warn.1"></li>
								<li data-i18n="ptable.warn.2"></li>
							</ul>
						</div>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
