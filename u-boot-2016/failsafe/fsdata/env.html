<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="env.title"></title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>

<body onload="appInit('env')" data-page="env">
    <div class="app">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
        <div class="main">
            <div id="m">
                <div class="card-title-section">
                    <h1 data-i18n="env.title"></h1>
                </div>

                <div class="card-hint-section">
                    <p data-i18n-html="env.hint"></p>
                </div>

                <div class="card-main-section">
                    <div class="card-main-inner">
                        <!-- 环境变量表格容器 -->
                        <div id="env_table_container" class="env-table-container">
                            <!-- 滚动容器 -->
                            <div class="env-table-scroll">
                                <table id="env_table" class="env-table" style="display:none;">
                                    <thead>
                                        <tr>
                                            <th class="env-col-name" data-i18n="env.thead.name"></th>
                                            <th class="env-col-value" data-i18n="env.thead.value"></th>
                                            <th class="env-col-actions" data-i18n="env.thead.actions"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="env_table_body"></tbody>
                                </table>
                            </div>
                            <!-- 空状态提示 -->
                            <div id="env_empty" class="env-empty" data-i18n="env.placeholder"></div>
                        </div>

                        <!-- 编辑/添加面板 -->
                        <div id="env_edit_panel" class="env-edit-panel" style="display:none;">
                            <div id="env_edit_title" class="env-edit-title"></div>
                            <div class="form-row form-row-2">
                                <div class="field">
                                    <label for="env_edit_name" data-i18n="env.label.name"></label>
                                    <input id="env_edit_name" class="field-control" type="text"
                                           autocomplete="off" autocapitalize="off"
                                           autocorrect="off" spellcheck="false">
                                </div>
                                <div class="field">
                                    <label for="env_edit_value" data-i18n="env.label.value"></label>
                                    <input id="env_edit_value" class="field-control" type="text"
                                           autocomplete="off" autocapitalize="off"
                                           autocorrect="off" spellcheck="false">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="button" onclick="envManager.saveEdit()" data-i18n="env.action.save"></button>
                                <button type="button" class="button button-warn" onclick="envManager.resetSingle()" data-i18n="env.action.reset_single"></button>
                                <button type="button" class="button" onclick="envManager.cancelEdit()" data-i18n="env.action.cancel"></button>
                            </div>
                        </div>

                        <!-- 工具栏 -->
                        <div class="env-toolbar">
                            <span id="env_count" class="env-count"></span>
                            <span class="sep">|</span>
                            <span id="env_status" class="env-status"></span>
                        </div>

                        <!-- 主操作按钮栏 -->
                        <div class="form-actions env-main-actions">
                            <button type="button" class="button" onclick="envManager.refresh()" data-i18n="env.action.refresh"></button>
                            <button type="button" class="button" onclick="envManager.showAddPanel()" data-i18n="env.action.add"></button>
                            <button type="button" class="button" onclick="envManager.restore()" data-i18n="env.action.restore"></button>
                            <button type="button" class="button button-danger" onclick="envManager.resetAll()" data-i18n="env.action.reset"></button>
                        </div>
                    </div>
                </div>

                <div class="card-foot-section">
                    <div class="card-foot-inner">
                        <div class="i w">
                            <strong data-i18n="common.warnings"></strong>
                            <ul>
                                <li data-i18n="env.warn.1"></li>
                                <li data-i18n="env.warn.2"></li>
                                <li data-i18n="env.warn.3"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div id="version"></div>
        </div>
    </div>

    <!-- 隐藏的文件选择器 - 用于恢复环境变量 -->
    <input type="file" id="env_restore_file" style="display:none;">
</body>

</html>
