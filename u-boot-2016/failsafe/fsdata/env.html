<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="env.title"></title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>

<body onload="appInit('env')" data-page="env">
    <div class="app">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
        <div class="main">
            <div id="m">
                <div class="card-title-section">
                    <h1 data-i18n="env.title"></h1>
                </div>

                <div class="card-hint-section">
                    <p data-i18n-html="env.hint"></p>
                </div>

                <div class="card-main-section">
                    <div class="card-main-inner">
                        <div class="env-toolbar">
                            <span id="env_count" class="env-count"></span>
                            <span class="sep">|</span>
                            <span id="env_status" class="env-status"></span>
                        </div>

                        <div id="env_list" class="env-output" aria-label="env list"></div>

                        <div class="form-row form-row-2">
                            <div class="field">
                                <label for="env_name" data-i18n="env.label.name"></label>
                                <input id="env_name" class="field-control" type="text"
                                       autocomplete="off" autocapitalize="off"
                                       autocorrect="off" spellcheck="false">
                            </div>
                            <div class="field">
                                <label for="env_value" data-i18n="env.label.value"></label>
                                <input id="env_value" class="field-control" type="text"
                                       autocomplete="off" autocapitalize="off"
                                       autocorrect="off" spellcheck="false">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="button" onclick="envManager.set()" data-i18n="env.action.set"></button>
                            <button type="button" class="button button-warn" onclick="envManager.unset()" data-i18n="env.action.unset"></button>
                            <button type="button" class="button" onclick="envManager.refresh()" data-i18n="env.action.refresh"></button>
                        </div>

                        <div class="form-row">
                            <div class="field">
                                <label for="env_file" data-i18n="env.label.file"></label>
                                <input id="env_file" class="field-control" type="file" />
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="button button-danger" onclick="envManager.reset()" data-i18n="env.action.reset"></button>
                            <button type="button" class="button" onclick="envManager.restore()" data-i18n="env.action.restore"></button>
                        </div>

                        <div class="env-restore-hint" data-i18n="env.restore.hint"></div>
                    </div>
                </div>

                <div class="card-foot-section">
                    <div class="card-foot-inner">
                        <div class="i w">
                            <strong data-i18n="common.warnings"></strong>
                            <ul>
                                <li data-i18n="env.warn.1"></li>
                                <li data-i18n="env.warn.2"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div id="version"></div>
        </div>
    </div>
</body>

</html>
