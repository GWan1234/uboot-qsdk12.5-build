<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="console.title"></title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>

<body onload="appInit('console')" data-page="console">
    <div class="app">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
        <div class="main">
            <div id="m">
                <div class="card-title-section">
                    <h1 data-i18n="console.title"></h1>
                </div>

                <div class="card-hint-section">
                    <p data-i18n-html="console.hint"></p>
                </div>

                <div class="card-main-section">
                    <div class="card-main-inner">
                        <div id="console_out" class="console-output"></div>

                        <div class="console-toolbar">
                            <div class="console-status" id="console_status"></div>
                            <div class="console-toolbar-actions">
                                <button type="button" class="button button-sm" onclick="consoleManager.clear()" data-i18n="console.clear"></button>
                            </div>
                        </div>

                        <div class="console-input-row">
                            <div class="field console-input-field">
                                <input id="console_cmd" class="field-control console-input"
                                       type="text" autocomplete="off"
                                       autocapitalize="off" autocorrect="off" spellcheck="false"
                                       data-i18n-attr="placeholder:console.placeholder.cmd">
                            </div>
                            <button type="button" class="button" onclick="consoleManager.send()" data-i18n="console.send"></button>
                        </div>
                    </div>
                </div>

                <div class="card-foot-section">
                    <div class="card-foot-inner">
                        <div class="i w">
                            <strong data-i18n="common.warnings"></strong>
                            <ul>
                                <li data-i18n="console.warn.1"></li>
                                <li data-i18n="console.warn.2"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div id="version"></div>
        </div>
    </div>
</body>

</html>
