<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="console.title"></title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>

<body onload="appInit('console')" data-page="console">
    <div class="app">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
        <div class="main">
            <div id="m">
                <div class="card-title-section">
                    <h1 data-i18n="console.title"></h1>
                </div>

                <div class="card-main-section">
                    <div id="terminal" class="terminal-container">
                        <div id="terminal_output" class="terminal-output"></div>
                        <div id="terminal_status" class="terminal-status"></div>
                        <div class="terminal-input-line">
                            <span class="terminal-prompt">></span>
                            <span class="terminal-input-wrapper">
                                <input type="text" id="terminal_cmd" class="terminal-input"
                                        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                                        data-i18n-attr="placeholder:console.cmd.placeholder">
                            </span>
                            <div class="terminal-actions">
                                <button type="button" class="terminal-btn" onclick="consoleManager.send()" data-i18n="console.send"></button>
                                <button type="button" class="terminal-btn" onclick="consoleManager.uploadFile()" data-i18n="console.upload"></button>
                                <button type="button" class="terminal-btn" onclick="consoleManager.clear()" data-i18n="console.clear"></button>
                            </div>
                        </div>
                        <div id="cmd_suggestions" class="cmd-suggestions" style="display: none;">
                            <div id="suggestions_list" class="suggestions-list"></div>
                        </div>
                        <div id="terminal_file_info" class="terminal-file-info">
                            <div class="terminal-file-progress" id="terminal_file_progress">
                                <div class="bar-circle-mini" id="bar-circle-mini" style="--percent: 0;"></div>
                            </div>
                            <div class="terminal-file-message" id="terminal_file_message"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="version"></div>
        </div>
    </div>
</body>

</html>
