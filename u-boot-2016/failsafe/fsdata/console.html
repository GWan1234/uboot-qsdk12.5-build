<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="console.title"></title>
    <link rel="stylesheet" href="/style.css">
    <script src="/main.js"></script>
</head>

<body onload="appInit('console')" data-page="console">
    <div class="app">
        <aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
        <div class="main">
            <div id="m">
                <div class="card-title-section">
                    <h1 data-i18n="console.title"></h1>
                </div>

                <div class="card-main-section">
                    <div class="card-main-inner">
                        <div id="console_out" class="console-output"></div>

                        <div class="console-toolbar">
                            <div class="console-file-area">
                                <div id="console_file_progress" class="console-file-progress" style="display: none;">
                                    <div class="bar-circle-mini" id="bar-circle-mini" style="--percent: 0;"></div>
                                </div>
                                <div id="console_file_info" class="console-file-info"></div>
                            </div>

                            <div class="console-status-area">
                                <div class="console-status" id="console_status"></div>
                                <div class="console-actions">
                                    <button type="button" class="button button-sm" onclick="consoleManager.uploadFile()" data-i18n="console.upload"></button>
                                    <button type="button" class="button button-sm" onclick="consoleManager.clear()" data-i18n="console.clear"></button>
                                </div>
                            </div>
                        </div>

                        <div class="console-input-row">
                            <div class="field console-input-field" style="position: relative;">
                                <div id="cmd_suggestions" class="cmd-suggestions" style="display: none;">
                                    <div class="suggestions-header" data-i18n="console.cmd.suggest"></div>
                                    <div id="suggestions_list" class="suggestions-list"></div>
                                </div>
                                <input id="console_cmd" class="field-control console-input"
                                       type="text" autocomplete="off"
                                       autocapitalize="off" autocorrect="off" spellcheck="false"
                                       data-i18n-attr="placeholder:console.cmd.placeholder">
                            </div>
                            <button type="button" class="button" onclick="consoleManager.send()" data-i18n="console.send"></button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="version"></div>
        </div>
    </div>
</body>

</html>
