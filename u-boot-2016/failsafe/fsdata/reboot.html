<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
	<script>
		function init() {
			appInit('reboot');

			/*
			 * Trigger reboot via background request.
			 * Device will reset shortly after the HTTP connection is closed.
			 */
			ajax({
				url: '/reboot',
				done: function (response) {
					/* server may already be rebooting; keep the page as-is */
				},
				timeout: 30000
			})
		}
	</script>
</head>

<body onload="init()">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="reboot.title.in_progress"></h1>
				</div>
				<div class="card-hint-section">
					<p id="hint" data-i18n-html="reboot.hint.in_progress"></p>
				</div>
				<div class="card-main-section">
					<div class="card-main-inner">
						<div class="loading-spinner"></div>
					</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
