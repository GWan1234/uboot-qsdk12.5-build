<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="/style.css">
	<script src="/main.js"></script>
</head>

<body onload="appInit('sysinfo')" data-page="sysinfo">
	<div class="app">
		<aside id="sidebar" class="sidebar"></aside>
		<div class="sidebar-overlay" id="sidebarOverlay"></div>
		<button class="sidebar-toggle" id="sidebarToggle"></button>
		<div class="main">
			<div id="m">
				<div class="card-title-section">
					<h1 id="title" data-i18n="sysinfo.title"></h1>
				</div>

				<div class="card-main-section" id="board_info">
					<div class="card-main-inner"></div>
				</div>

				<div class="card-main-section" id="flash_info">
					<div class="card-main-inner"></div>
				</div>

				<div class="card-main-section" id="partitions_info">
					<div class="card-main-inner"></div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>
</body>

</html>
